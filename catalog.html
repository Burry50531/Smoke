<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Каталог</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="logo">KAIF SMOKE</div>
    <nav>
        <a href="index.html">Главная</a>
        <a href="catalog.html">Каталог</a>
        <a href="cart.html">Корзина <span id="cart-counter">0</span></a>
    </nav>
</header>

<div class="catalog-layout">
  <aside class="filter">
    <h3 class="filter-title">ФИЛЬТРЫ</h3>
    
    <button class="all-categories-btn" onclick="setFilter('all')">
        <span class="text">ВСЕ КАТЕГОРИИ</span>
    </button>
    
    <div class="filter-list">
        <button class="filter-item" onclick="setFilter('all')">
            Все <span>18</span>
        </button>

        <button class="filter-item" onclick="setFilter('liquid')">
            Жидкости <span>9</span>
        </button>

        <button class="filter-item" onclick="setFilter('disposable')">
            Одноразки <span>5</span>
        </button>

        <button class="filter-item">
            Скоро <span>???</span>
        </button>
    </div>

<div class="filter-section brands-section">
    <h3 class="filter-title">— БРЕНДЫ</h3>
    
    <div class="brand-grid-compact">
        <button class="brand-mini-btn active" onclick="filterByBrand('all')">Все</button>
        <button class="brand-mini-btn" onclick="filterByBrand('Elf Bar Raya D3')">ELF BAR Raya D3 25000 5%</button>
        <button class="brand-mini-btn" onclick="filterByBrand('Elf Bar Trio')">ELF BAR Trio 40000 5%</button>
        <button class="brand-mini-btn" onclick="filterByBrand('ELFLIQ')">ELFLIQ 30ml</button>
        <button class="brand-mini-btn" onclick="filterByBrand('VOZOL PRIME')">Vozol Prime 30ml</button>
    </div>
</div>
  </aside>

  <main class="main-content">
    <div class="grid-4" id="catalog-grid">
        </div>
  </main>
</div>


  </main>

</div>

<script src="script.js"></script>
</body>
</html>
