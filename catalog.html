<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Каталог</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>


<header class="header">
<a href="index.html" class="logo-link" style="text-decoration: none; color: inherit;">
    <div class="logo-container">
        <img src="images/IMG_2073.PNG" alt="Logo" class="header-logo-img">
        <div class="logo">MADE 
            <span class="text-yellow">PUFF</span>
        </div>
    </div>
</a>
    <nav>
        
        <a href="cart.html">Корзина <span id="cart-counter">0</span></a>
    </nav>
</header>

<div class="catalog-layout">
  <aside class="filter">
    <h3 class="filter-title">ФИЛЬТРЫ</h3>
    
    <button class="all-categories-btn" onclick="setFilter('all')">
        <span class="text">ВСЕ КАТЕГОРИИ</span>
    </button>
    
<div class="filter-list">
    <button class="filter-item" data-category="all" onclick="setFilter('all')">
        Все <span>86</span>
    </button>

<button class="filter-item" data-category="liquid" onclick="setFilter('liquid')">
        Жидкости <span>50</span>
    </button>
    <button class="filter-item" data-category="disposable" onclick="setFilter('disposable')">
        Одноразки <span>36</span>
    </button>

    <button class="filter-item" onclick="setFilter('soon')">
    Скоро <span>???</span>
</button>
</div>

<div class="filter-section brands-section">
    <h3 class="filter-title">— БРЕНДЫ</h3>
    
<div class="brand-grid-compact">
    <button class="brand-mini-btn active" onclick="filterByBrand('all')">Все</button>
    
    <button class="brand-mini-btn" onclick="filterByBrand('Elf Bar Raya D3')">
        ELF BAR Raya D3
    </button>

    <button class="brand-mini-btn" onclick="filterByBrand('Elf Bar Trio')">
        ELF BAR Trio
    </button>
    
    <button class="brand-mini-btn" onclick="filterByBrand('ELFLIQ')">
        ELFLIQ 30ml
    </button>

    <button class="brand-mini-btn" onclick="filterByBrand('VOZOL PRIME')">
        Vozol Prime 30ml
    </button>
</div>

</div>
  </aside>

<main class="main-content">
    <div class="search-container">
        <input type="text" id="catalog-search" placeholder="Поиск товаров..." onkeyup="searchProducts()">
    </div>
    
    <div id="dynamic-title" class="category-banner-mobile">ВСЕ КАТЕГОРИИ</div>

    <div class="grid-4" id="catalog-grid">
        </div>
</main>
</div>

<script src="script.js"></script>
</body>
</html>
